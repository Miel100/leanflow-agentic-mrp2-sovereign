<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>LeanFlow Agentic MRP2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }
        .header { background: #1a1d2e; padding: 20px 40px; border-bottom: 2px solid #3d5af1; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { color: #3d5af1; font-size: 24px; }
        .header span { color: #888; font-size: 14px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #1a1d2e; border-radius: 12px; padding: 24px; border: 1px solid #2a2d3e; }
        .card h3 { color: #3d5af1; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 32px; font-weight: bold; color: #fff; }
        .card .label { font-size: 12px; color: #888; margin-top: 4px; }
        .agents { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .agent { background: #1a1d2e; border: 1px solid #3d5af1; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #3d5af1; }
        .agent.active { background: #3d5af1; color: #fff; }
        .panel { background: #1a1d2e; border-radius: 12px; padding: 24px; border: 1px solid #2a2d3e; margin-bottom: 20px; }
        .panel h2 { color: #fff; margin-bottom: 16px; font-size: 18px; }
        .btn { background: #3d5af1; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .btn:hover { background: #2d4ae1; }
        .btn.secondary { background: #2a2d3e; }
        .btn.secondary:hover { background: #3a3d4e; }
        .output { background: #0f1117; border-radius: 8px; padding: 16px; margin-top: 16px; min-height: 80px; font-size: 13px; color: #a0a0a0; white-space: pre-wrap; border: 1px solid #2a2d3e; }
        .prompt-box { display: flex; gap: 10px; margin-bottom: 10px; }
        .prompt-box input { flex: 1; background: #0f1117; border: 1px solid #2a2d3e; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; }
        .prompt-box input:focus { outline: none; border-color: #3d5af1; }
        .status-dot { width: 8px; height: 8px; background: #00c853; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .mrp-result { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 16px; }
        .mrp-item { background: #0f1117; border-radius: 8px; padding: 12px; border: 1px solid #2a2d3e; font-size: 12px; }
        .mrp-item strong { color: #3d5af1; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class='header'>
        <h1>⚡ LeanFlow Agentic MRP2</h1>
        <span><span class='status-dot'></span>Sovereign Agentic System — Online</span>
    </div>
    <div class='container'>
        <div class='grid'>
            <div class='card'>
                <h3>System Status</h3>
                <div class='value' id='status'>...</div>
                <div class='label'>API Health</div>
            </div>
            <div class='card'>
                <h3>Active Agents</h3>
                <div class='value' id='agentCount'>...</div>
                <div class='label'>Running</div>
            </div>
            <div class='card'>
                <h3>Work Orders</h3>
                <div class='value' id='woCount'>...</div>
                <div class='label'>Last MRP Cycle</div>
            </div>
        </div>
        <div class='agents' id='agentList'></div>
        <div class='panel'>
            <h2>🤖 Supervisor Agent — Prompt Interface</h2>
            <div class='prompt-box'>
                <input type='text' id='promptInput' placeholder='e.g. Customize Rating File to use 2 shifts with 80% utilization...' />
                <button class='btn' onclick='sendPrompt()'>Send Prompt</button>
            </div>
            <div class='output' id='promptOutput'>Agent response will appear here...</div>
        </div>
        <div class='panel'>
            <h2>🔄 MRP Cycle</h2>
            <button class='btn' onclick='runMRP()'>Run Full MRP Cycle</button>
            <button class='btn secondary' style='margin-left:10px' onclick='window.open("/hangfire", "_blank")'>Open Scheduler</button>
            <div class='mrp-result' id='mrpResult'></div>
        </div>
    </div>
    <script>
        const api = '';
        async function loadStatus() {
            const r = await fetch(api + '/api/mrp/status');
            const d = await r.json();
            document.getElementById('status').textContent = d.status.toUpperCase();
            document.getElementById('agentCount').textContent = d.agents.length;
            const list = document.getElementById('agentList');
            list.innerHTML = d.agents.map(a => "<div class='agent active'>" + a + " Agent</div>").join('');
        }
         async function runMRP() {
    document.getElementById('mrpResult').innerHTML = "<div style='color:#888'>Running MRP cycle...</div>";
    const r = await fetch(api + '/api/mrp/run');
    const d = await r.json();
    document.getElementById('woCount').textContent = d.totalWorkOrders;
    let html = '';
    d.items.forEach(item => {
        html += "<div class='mrp-item' style='grid-column:1/-1'><strong style='color:#3d5af1;font-size:14px'>" + item.itemCode + " — " + item.description + " [" + item.machineGroup + "]</strong></div>";
        html += "<div class='mrp-item'><strong>Demand</strong>" + item.demand + "</div>";
        html += "<div class='mrp-item'><strong>RCCP</strong>" + item.rccp + "</div>";
        html += "<div class='mrp-item'><strong>CRP</strong>" + item.crp + "</div>";
        html += "<div class='mrp-item' style='grid-column:1/-1'><strong>SFC</strong>" + item.sfc + "</div>";
    });
    document.getElementById('mrpResult').innerHTML = html;
}       async function sendPrompt() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;
            document.getElementById('promptOutput').textContent = 'Thinking...';
            const r = await fetch(api + '/api/mrp/prompt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(prompt) });
            const d = await r.json();
            document.getElementById('promptOutput').textContent = d.response;
        }
        document.getElementById('promptInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendPrompt(); });
        loadStatus();
    </script>
</body>
</html>
